# ARAH project config — customize per repository
# Generated by `arah init`. Safe to edit; preserved on `arah update`.

version: 1
harness:
  source: sraphaz/arah-harness
  version: "0.2.3"
  repository: https://github.com/sraphaz/arah-harness
  release: v0.2.3

project:
  name: "SacredChants"
  stack: frontend  # backend | frontend | fullstack | docs

tests:
  backend: "echo 'no backend tests'"
  frontend: "npm test"
  all: "npm test"

# Domain agents (consultivos) — edit then run: arah domain sync
domains:
  - id: chant-content
    name: Chant Content
    description: Conteúdo de mantras/cantos — JSON, locales, áudio e timestamps de karaokê
    paths:
      - src/content/chants/**
      - src/content/schemas/**
      - scripts/**chant**
      - scripts/lib/chant-timestamps.mjs
      - public/audio/**
    enrich: |
      Cada canto tem JSON com Devanagari, IAST e traduções, locales (ar/hi), e
      timestamps de karaokê. Karaokê exige public/audio/<slug>.mp3 + lines[].start.
      Spotify (spotifyUrl) é listen-only. Siga o skill de ingestão em
      .cursor/skills/chant-ingestion/SKILL.md e o schema em src/content/schemas/chant.ts.
    validate: |
      Validar schema do canto, consistência de locales, e alinhamento dos
      timestamps antes do merge. Não commitar segredos nem áudio fora de public/audio.
    references:
      - AGENTS.md
      - CONTRIBUTING.md

# Stack specialists — optional; domain sync gera rules em choreography.domains.yaml
specialists: []
