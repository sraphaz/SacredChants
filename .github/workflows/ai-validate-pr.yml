# Optional: validate new chant content in PRs with an AI model (cheap).
# Runs when PR touches src/content/chants/*.json.
# Enable: set OPENAI_API_KEY in repo secrets. Disable: set var AI_VALIDATION_ENABLED = false.
name: AI validate contribution PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/content/chants/*.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ vars.AI_VALIDATION_ENABLED != 'false' }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get first changed chant file
        id: file
        run: |
          F=$(git diff --name-only origin/main...HEAD -- 'src/content/chants/*.json' | head -1)
          echo "path=$F" >> $GITHUB_OUTPUT
          echo "Found: $F"

      - name: Run AI validation
        if: steps.file.outputs.path != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node .github/scripts/ai-validate-chant.mjs "${{ steps.file.outputs.path }}" || true
          if [ ! -f comment.md ]; then
            echo "## 🤖 AI validation" > comment.md
            echo "" >> comment.md
            echo "Skipped or failed (check logs)." >> comment.md
          fi

      - name: Post comment to PR
        if: steps.file.outputs.path != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('comment.md') ? fs.readFileSync('comment.md', 'utf8') : '🤖 AI validation skipped.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
