# Auto-merge Dependabot version bumps once required CI checks pass.
# Requires: Settings → General → Allow auto-merge (enabled for this repo).
name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for version updates
        # Patch/minor always; major only for release/deploy CLI tooling (not test/app frameworks).
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          (
            steps.metadata.outputs.update-type == 'version-update:semver-major' &&
            contains(fromJSON('["vercel","semantic-release","@semantic-release/commit-analyzer","@semantic-release/github","@semantic-release/release-notes-generator","@types/node","typescript","cross-env","serve"]'), steps.metadata.outputs.dependency-names)
          )
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
