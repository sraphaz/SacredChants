# Deploy manual para GitHub Pages (https://sraphaz.github.io/SacredChants/)
#
# Uso: apenas workflow_dispatch — para publicar main manualmente (ex.: hotfix).
# O deploy automático após release está no mesmo pipeline que o CI (ci.yml: job deploy).
name: Deploy to GitHub Pages (manual)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          path: .
          node-version: 20
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
