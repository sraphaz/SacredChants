# Deploy to GitHub Pages (https://sraphaz.github.io/SacredChants/)
#
# Fluxo: CI (ci.yml) corre build → lint → e2e → release (só em main).
#        Quando semantic-release publica uma release, este workflow dispara e faz deploy do TAG dessa release.
#        Em execução manual (workflow_dispatch) faz deploy de main.
#
# ref: tag da release = código exato que foi testado e versionado; main = só em deploy manual.
name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || 'main' }}

      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          path: .
          node-version: 20
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
